<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Juego de Saltos Avanzado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Juego de Saltos Avanzado</h1>

<div id="menu">
  <p>Elegí tu personaje:</p>
  <button onclick="selectCharacter('boy')">👦 Nene</button>
  <button onclick="selectCharacter('girl')">👧 Nena</button>
</div>

<div id="game-container">
  <canvas id="game" width="800" height="300"></canvas>
</div>

<div id="controls" style="display:none;">
  <button id="btnPause">Pausar</button>
  <button id="btnRestart">Reiniciar</button>
</div>

<p>Puntaje: <span id="score">0</span></p>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_42324ae35d.mp3?filename=8-bit-retro-loop-6450.mp3" type="audio/mpeg" />
  Tu navegador no soporta audio.
</audio>

<script src="game.js"></script>
</body>
</html>
